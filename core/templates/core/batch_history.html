{% extends 'core/base.html' %}
{% block content %}
<h1 class="page-title">Batch History</h1>

<div class="card">
    <table class="data-table">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>ZIP</th>
            <th>Status</th>
            <th>Uploaded At</th>
            <th>Action</th>
        </tr>
        {% for batch in batches %}
        <tr>
            <td>{{ batch.id }}</td>
            <td>{{ batch.name }}</td>
            <td>{{ batch.zip_file_name }}</td>
            <td>{{ batch.status }}</td>
            <td>{{ batch.uploaded_at }}</td>
            <td><a href="{% url 'batch_detail' batch.id %}">View</a></td>
        </tr>
        {% endfor %}
    </table>
</div>
{% endblock %}
