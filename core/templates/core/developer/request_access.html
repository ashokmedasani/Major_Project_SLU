{% extends "core/developer/base_developer.html" %}

{% block content %}
<div class="container mt-4">
    <h3>Request Developer Access</h3>

    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            <label>Username</label>
            {{ form.username }}
        </div>

        <div class="mb-3">
            <label>Email</label>
            {{ form.email }}
        </div>

        <div class="mb-3">
            <label>Password</label>
            {{ form.password }}
        </div>

        <button type="submit" class="btn btn-primary">
            Submit Request
        </button>
    </form>
</div>
{% endblock %}
