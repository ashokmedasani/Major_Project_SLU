{% extends 'core/base.html' %}
{% block content %}
<h1 class="page-title">Upload ZIP Batch</h1>

<div class="card">
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn-primary" type="submit">Upload Batch</button>
    </form>
</div>
{% endblock %}
